name: Build APK (Debug + Release)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ⚙️ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 📦 Install dependencies (INI SUDAH CUKUP)
      - name: Install Dependencies
        run: npm install

      # ⚡ Sync Capacitor (WAJIB sebelum build Android)
      - name: Sync Capacitor
        run: npx cap sync android

      # 📁 Copy web assets (kalau ada update www/build)
      - name: Copy Web Assets
        run: npx cap copy android

      # 🔐 Decode Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/elara-key.jks

      # 🔐 Setup Signing Properties
      - name: Setup Signing Config
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=elara-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      # 🛠 Inject signing ke Gradle (safe version)
      - name: Configure Gradle Signing
        run: |
          sed -i '/android {/a\
          signingConfigs {\
              release {\
                  storeFile file(MYAPP_UPLOAD_STORE_FILE)\
                  storePassword MYAPP_UPLOAD_STORE_PASSWORD\
                  keyAlias MYAPP_UPLOAD_KEY_ALIAS\
                  keyPassword MYAPP_UPLOAD_KEY_PASSWORD\
              }\
          }\
          buildTypes {\
              release {\
                  signingConfig signingConfigs.release\
                  minifyEnabled false\
              }\
          }' android/app/build.gradle

      # 🔧 Setup Gradle permission
      - name: Grant Execute Permission
        run: chmod +x android/gradlew

      # 🧪 Build Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 🚀 Build Release APK (SIGNED)
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 📦 Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: elaraai-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 📦 Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: elaraai-release
          path: android/app/build/outputs/apk/release/app-release.apk
