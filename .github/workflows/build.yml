name: Build APK (Debug + Release)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor Android
        run: npm install @capacitor/android

      - name: Init Capacitor
        run: npx cap init "Elara Ai" "com.mj.elaraai" --web-dir=www

      - name: Add Android
        run: npx cap add android

      - name: Copy Web Assets
        run: npx cap copy

      # 🔐 Decode keystore dari Base64
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/elara-key.jks

      # 🔐 Setup signing config
      - name: Setup Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=elara-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      # 🔧 Inject signing ke build.gradle
      - name: Configure Gradle Signing
        run: |
          sed -i '/android {/a\
              signingConfigs {\n\
                  release {\n\
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)\n\
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD\n\
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS\n\
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD\n\
                  }\n\
              }\n\
              buildTypes {\n\
                  release {\n\
                      signingConfig signingConfigs.release\n\
                      minifyEnabled false\n\
                  }\n\
              }' android/app/build.gradle

      # 🛠 Build DEBUG
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 🚀 Build RELEASE (SIGNED)
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 📦 Upload Debug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: elaraai-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 📦 Upload Release
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: elaraai-release
          path: android/app/build/outputs/apk/release/app-release.apk
